name: graph-keeper

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run graph-keeper
        run: node index.js
        env:
          GITHUB_TOKEN: ${{ secrets.GRAPH_TOKEN }}
          COMMIT_MODE: realistic
